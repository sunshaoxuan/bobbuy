name: BOBBuy CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_playwright_e2e:
        description: "Run the Playwright UI regression gate."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: mvn -B test --file backend/pom.xml

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: npm test --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  docker-build:
    name: docker-build
    needs:
      - backend-test
      - frontend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend package for Docker image
        run: mvn -B -DskipTests package --file backend/pom.xml

      - name: Build backend image
        run: docker build backend -t bobbuy-backend-test

      - name: Build frontend image
        run: docker build frontend -t bobbuy-frontend-test

  playwright-e2e:
    name: playwright-e2e
    if: github.event_name == 'workflow_dispatch' && inputs.run_playwright_e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run Playwright E2E
        run: npm run e2e --prefix frontend

  # `npm run e2e:ai` remains outside hosted default CI because it requires a dedicated
  # backend profile, external AI model access, object storage, and seeded data.
