name: Maven dependency-check

on:
  push:
    branches:
      - main
      - 'copilot/**'
    paths:
      - 'backend/**'
      - 'pom.xml'
      - '.github/workflows/dependency-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'pom.xml'
      - '.github/workflows/dependency-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-check:
    name: dependency-check
    runs-on: ubuntu-latest
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      NVD_DATAFEED_URL: ${{ vars.NVD_DATAFEED_URL }}
      KNOWN_EXPLOITED_URL: ${{ vars.KNOWN_EXPLOITED_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP dependency-check
        shell: bash
        run: |
          set -euo pipefail

          args=(
            -B
            org.owasp:dependency-check-maven:12.1.8:check
            -Dformats=HTML,JSON
            -DoutputDirectory=/tmp/bobbuy-dependency-check
            -DskipProvidedScope=true
            -DskipTestScope=true
          )

          if [[ -n "${NVD_API_KEY:-}" ]]; then
            args+=("-DnvdApiKeyEnvironmentVariable=NVD_API_KEY")
          fi

          if [[ -n "${NVD_DATAFEED_URL:-}" ]]; then
            args+=("-DnvdDatafeedUrl=${NVD_DATAFEED_URL}")
          fi

          if [[ -n "${KNOWN_EXPLOITED_URL:-}" ]]; then
            args+=("-DknownExploitedUrl=${KNOWN_EXPLOITED_URL}")
          fi

          mvn "${args[@]}" --file backend/pom.xml

      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: /tmp/bobbuy-dependency-check
          if-no-files-found: ignore
