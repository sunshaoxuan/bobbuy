# Development Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/bobbuy
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=bobbuy
spring.datasource.password=bobbuypassword
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=true

# Logging
logging.level.com.bobbuy=DEBUG
bobbuy.security.jwt.secret=dev-jwt-secret-change-before-public-use
bobbuy.security.header-auth.enabled=true
