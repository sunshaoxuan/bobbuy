# Development Configuration (H2)
spring.datasource.url=jdbc:h2:mem:bobbuy;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Logging
logging.level.com.bobbuy=DEBUG
spring.security.user.name=dev
spring.security.user.password=dev-password
