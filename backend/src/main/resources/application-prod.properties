# Production Configuration for BOBBuy

# Database (Inherited from Environment Variables)
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Logging
logging.level.com.bobbuy=INFO
logging.level.org.springframework=WARN
logging.file.name=logs/bobbuy-prod.log

# Security
bobbuy.security.jwt.secret=${BOBBUY_SECURITY_JWT_SECRET:}
bobbuy.security.jwt.ttl-seconds=${BOBBUY_SECURITY_JWT_TTL_SECONDS:3600}
bobbuy.security.header-auth.enabled=false

# MinIO
bobbuy.minio.bucket=bobbuy-media

# WebSocket
bobbuy.websocket.broker-relay.enabled=true
