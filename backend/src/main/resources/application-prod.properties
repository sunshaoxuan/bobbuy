# Production Configuration for BOBBuy

# Database (Inherited from Environment Variables)
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Logging
logging.level.com.bobbuy=INFO
logging.level.org.springframework=WARN
logging.file.name=logs/bobbuy-prod.log

# Security
# In production, we expect a real Auth provider or hardened settings
spring.security.user.name=${ADMIN_USER:-admin}
spring.security.user.password=${ADMIN_PASSWORD:-admin-password}

# MinIO
bobbuy.minio.bucket=bobbuy-media
