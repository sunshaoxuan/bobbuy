spring.datasource.url=jdbc:h2:mem:bobbuy;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.cloud.nacos.discovery.enabled=${NACOS_ENABLED:false}
spring.cloud.nacos.config.enabled=${NACOS_ENABLED:false}
spring.cloud.sentinel.enabled=${SENTINEL_ENABLED:false}

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:localhost:8848}
spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:localhost:8848}
spring.cloud.sentinel.transport.dashboard=${SENTINEL_DASHBOARD:localhost:8858}

bobbuy.fx.reference-rate=0.0500
bobbuy.fx.current-rate=${BOBBUY_FX_CURRENT_RATE:${bobbuy.fx.reference-rate}}
bobbuy.trip.unit-weight=1.0
bobbuy.trip.unit-volume=1.0
bobbuy.procurement.reconcile-default-quantity=1
