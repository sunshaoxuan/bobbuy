# Bobbuy Infrastructure Configuration

# MinIO
bobbuy.minio.endpoint=http://localhost:9000
bobbuy.minio.accessKey=bobbuyadmin
bobbuy.minio.secretKey=bobbuypassword
bobbuy.minio.bucket=bobbuy-media

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=bobbuy
spring.rabbitmq.password=bobbuypassword
bobbuy.websocket.broker-relay.enabled=false
bobbuy.websocket.broker-relay.host=${spring.rabbitmq.host}
bobbuy.websocket.broker-relay.port=61613
bobbuy.websocket.broker-relay.login=${spring.rabbitmq.username}
bobbuy.websocket.broker-relay.passcode=${spring.rabbitmq.password}

# Database
spring.datasource.url=jdbc:h2:mem:bobbuy;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Logging
spring.main.log-startup-info=false
spring.security.user.name=dev
spring.security.user.password=dev-password
logging.level.com.bobbuy=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.security=WARN
