# ====================================================================
# BOBBuy Base Configuration
# ====================================================================

# spring.application.name=bobbuy
spring.profiles.active=dev

# Infrastructure Defaults (Environment variables take precedence)
bobbuy.minio.endpoint=${BOBBUY_MINIO_ENDPOINT:http://minio:9000}
bobbuy.minio.accessKey=${BOBBUY_MINIO_ACCESS_KEY:bobbuyadmin}
bobbuy.minio.secretKey=${BOBBUY_MINIO_SECRET_KEY:bobbuypassword}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:${RABBITMQ_DEFAULT_USER:bobbuy}}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS:bobbuypassword}}

bobbuy.websocket.broker-relay.enabled=false
bobbuy.websocket.broker-relay.host=${spring.rabbitmq.host}
bobbuy.websocket.broker-relay.port=${BOBBUY_WEBSOCKET_BROKER_RELAY_PORT:61613}
bobbuy.websocket.broker-relay.login=${spring.rabbitmq.username}
bobbuy.websocket.broker-relay.passcode=${spring.rabbitmq.password}
bobbuy.websocket.heartbeat.send-interval-ms=${BOBBUY_WEBSOCKET_HEARTBEAT_SEND_INTERVAL_MS:5000}
bobbuy.websocket.heartbeat.receive-interval-ms=${BOBBUY_WEBSOCKET_HEARTBEAT_RECEIVE_INTERVAL_MS:5000}
bobbuy.chat.redis.pubsub.enabled=${BOBBUY_CHAT_REDIS_PUBSUB_ENABLED:false}
bobbuy.chat.redis.pubsub.channel=${BOBBUY_CHAT_REDIS_PUBSUB_CHANNEL:bobbuy.chat.realtime}

# Seed Data
bobbuy.seed.enabled=${BOBBUY_SEED_ENABLED:false}

# AI Hermes
bobbuy.ai.llm.main.url=${BOBBUY_AI_LLM_MAIN_URL:http://ccnode.briconbric.com:22545}
bobbuy.ai.llm.edge.url=${BOBBUY_AI_LLM_EDGE_URL:http://192.168.20.218:11434}
