spring.datasource.url=${BOBBUY_DB_URL:jdbc:postgresql://${BOBBUY_DB_HOST:localhost}:${BOBBUY_DB_PORT:5432}/${BOBBUY_DB_NAME:bobbuy}}
spring.datasource.username=${BOBBUY_DB_USERNAME:bobbuy}
spring.datasource.password=${BOBBUY_DB_PASSWORD:bobbuy}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${BOBBUY_DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${BOBBUY_DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${BOBBUY_DB_CONN_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${BOBBUY_DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${BOBBUY_DB_MAX_LIFETIME_MS:1800000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:localhost:8848}
spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:localhost:8848}
spring.cloud.sentinel.transport.dashboard=${SENTINEL_DASHBOARD:localhost:8080}
