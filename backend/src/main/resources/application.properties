# Bobbuy Infrastructure Configuration

# MinIO
bobbuy.minio.endpoint=http://localhost:9000
bobbuy.minio.accessKey=bobbuyadmin
bobbuy.minio.secretKey=bobbuypassword
bobbuy.minio.bucket=bobbuy-media

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=bobbuy
spring.rabbitmq.password=bobbuypassword

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/bobbuy
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=bobbuy
spring.datasource.password=bobbuypassword
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.com.bobbuy=DEBUG
