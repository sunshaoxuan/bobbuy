spring.datasource.url=jdbc:h2:mem:bobbuy;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.main.log-startup-info=false
spring.main.banner-mode=off
spring.security.user.name=test
spring.security.user.password=test
bobbuy.security.default-role=AGENT
spring.devtools.restart.enabled=false
logging.level.root=WARN
logging.level.com.bobbuy=INFO
logging.level.com.bobbuy.api.RequestLoggingInterceptor=WARN
logging.level.com.bobbuy.service.AiProductOnboardingService=WARN
logging.level.com.bobbuy.service.AuditLogService=WARN
logging.level.com.bobbuy.service.FxRateService=ERROR
logging.level.com.bobbuy.service.AiSearchService=ERROR
logging.level.com.bobbuy.service.ImageStorageService=WARN
logging.level.com.bobbuy.api.response.GlobalExceptionHandler=ERROR
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration=ERROR
logging.level.org.springframework.boot.devtools=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.cloud.nacos.discovery.enabled=false
spring.cloud.nacos.config.enabled=false
spring.cloud.sentinel.enabled=false

bobbuy.ai.ollama.url=http://localhost:11434
bobbuy.ai.ollama.model=llava

bobbuy.minio.endpoint=http://localhost:9000
bobbuy.minio.accessKey=minioadmin
bobbuy.minio.secretKey=minioadmin
bobbuy.minio.bucket=test-bucket
bobbuy.minio.enabled=false
