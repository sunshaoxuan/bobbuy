server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  config:
    import: optional:nacos:bobbuy-infra.yaml,optional:nacos:gateway-service.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
    gateway:
      routes:
        - id: im-websocket
          uri: lb:ws://im-service
          predicates:
            - Path=/ws,/ws/**
        - id: im-api
          uri: lb://im-service
          predicates:
            - Path=/api/chat/**
        - id: ai-api
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: core-default
          uri: lb://core-service
          predicates:
            - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
