      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bobbuy-frontend
    restart: always
    volumes:
      - ./data/logs/frontend:/var/log/nginx
    depends_on:
      gateway-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bobbuy-net

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-gateway
    container_name: bobbuy-gateway-service
    restart: always
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      BOBBUY_SECURITY_SERVICE_TOKEN: ${BOBBUY_SECURITY_SERVICE_TOKEN:-}
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      core-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      im-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - bobbuy-net

  gateway:
    image: nginx:alpine
    container_name: bobbuy-gateway
    restart: always
    ports:
      - "${BOBBUY_BIND_HOST:-127.0.0.1}:${GATEWAY_HOST_PORT:-80}:80"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/logs/gateway:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      gateway-service:
        condition: service_healthy
    networks:
      - bobbuy-net

networks:
  bobbuy-net:
    name: bobbuy-net
    driver: bridge
