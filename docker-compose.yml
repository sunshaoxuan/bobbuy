      BOBBUY_AI_LLM_CODEX_BRIDGE_TIMEOUT_SECONDS: ${BOBBUY_AI_LLM_CODEX_BRIDGE_TIMEOUT_SECONDS:-120}
      BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_SALT: ${BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_SALT:-}
      BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_NONCE: ${BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_NONCE:-}
      BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_CIPHERTEXT: ${BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_CIPHERTEXT:-}
