services:
  postgres:
    image: postgres:15-alpine
    container_name: bobbuy-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bobbuy}
      POSTGRES_USER: ${POSTGRES_USER:-bobbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bobbuypassword}
    volumes:
      # If you previously used ./data/postgres_v18, migrate/backup it manually before first boot with this path.
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${BOBBUY_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bobbuy} -d ${POSTGRES_DB:-bobbuy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  minio:
    image: minio/minio:latest
    container_name: bobbuy-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bobbuyadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bobbuypassword}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    ports:
      - "${BOBBUY_BIND_HOST:-127.0.0.1}:${MINIO_API_HOST_PORT:-9000}:9000"
      - "${BOBBUY_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  redis:
    image: redis:7-alpine
    container_name: bobbuy-redis
    restart: always
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bobbuy-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bobbuy-rabbitmq
    restart: always
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp &&
      rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-bobbuy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-bobbuypassword}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  nacos:
    image: nacos/nacos-server:v2.3.2-slim
    container_name: bobbuy-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JAVA_OPT: -XX:-UseContainerSupport
      MANAGEMENT_METRICS_BINDERS_PROCESSOR_ENABLED: "false"
      JAVA_OPT_EXT: --management.metrics.binders.processor.enabled=false
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "${BOBBUY_BIND_HOST:-127.0.0.1}:${NACOS_HOST_PORT:-8848}:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - bobbuy-net

  nacos-init:
    image: curlimages/curl:8.7.1
    container_name: bobbuy-nacos-init
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      CONFIG_DIR: /config
    command: ["sh", "/scripts/init-config.sh"]
    volumes:
      - ./infra/nacos/config:/config:ro
      - ./infra/nacos/init-config.sh:/scripts/init-config.sh:ro
    networks:
      - bobbuy-net

  core-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-core
    container_name: bobbuy-core-service
    restart: always
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bobbuy}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bobbuy}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bobbuypassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_FLYWAY_ENABLED: "true"
      BOBBUY_FLYWAY_BASELINE_ON_MIGRATE: ${BOBBUY_FLYWAY_BASELINE_ON_MIGRATE:-false}
      BOBBUY_SEED_ENABLED: ${BOBBUY_SEED_ENABLED:-false}
      BOBBUY_SEED_PICKING_FIXTURE_ENABLED: ${BOBBUY_SEED_PICKING_FIXTURE_ENABLED:-false}
      BOBBUY_SECURITY_JWT_SECRET: ${BOBBUY_SECURITY_JWT_SECRET:-}
      BOBBUY_SECURITY_JWT_TTL_SECONDS: ${BOBBUY_SECURITY_JWT_TTL_SECONDS:-3600}
      BOBBUY_SECURITY_REFRESH_TOKEN_TTL_SECONDS: ${BOBBUY_SECURITY_REFRESH_TOKEN_TTL_SECONDS:-604800}
      BOBBUY_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: ${BOBBUY_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED:-true}
      BOBBUY_SECURITY_REFRESH_COOKIE_NAME: ${BOBBUY_SECURITY_REFRESH_COOKIE_NAME:-bobbuy_refresh_token}
      BOBBUY_SECURITY_REFRESH_COOKIE_PATH: ${BOBBUY_SECURITY_REFRESH_COOKIE_PATH:-/api/auth}
      BOBBUY_SECURITY_REFRESH_COOKIE_SECURE: ${BOBBUY_SECURITY_REFRESH_COOKIE_SECURE:-false}
      BOBBUY_SECURITY_REFRESH_COOKIE_SAME_SITE: ${BOBBUY_SECURITY_REFRESH_COOKIE_SAME_SITE:-Lax}
      BOBBUY_SECURITY_CSRF_COOKIE_NAME: ${BOBBUY_SECURITY_CSRF_COOKIE_NAME:-bobbuy_csrf_token}
      BOBBUY_SECURITY_CSRF_COOKIE_PATH: ${BOBBUY_SECURITY_CSRF_COOKIE_PATH:-/}
      BOBBUY_SECURITY_CSRF_HEADER_NAME: ${BOBBUY_SECURITY_CSRF_HEADER_NAME:-X-BOBBUY-CSRF-TOKEN}
      BOBBUY_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS: ${BOBBUY_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost,http://127.0.0.1,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173}
      BOBBUY_SECURITY_HEADER_AUTH_ENABLED: ${BOBBUY_SECURITY_HEADER_AUTH_ENABLED:-false}
      BOBBUY_SECURITY_SERVICE_TOKEN: ${BOBBUY_SECURITY_SERVICE_TOKEN:-}
      BOBBUY_MINIO_ENDPOINT: http://minio:9000
      BOBBUY_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bobbuyadmin}
      BOBBUY_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bobbuypassword}
      BOBBUY_MINIO_BUCKET: ${BOBBUY_MINIO_BUCKET:-bobbuy-media}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-bobbuy}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-bobbuypassword}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bobbuy-net

  ai-service:
