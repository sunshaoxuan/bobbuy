      context: ./bobbuy-ocr
    container_name: bobbuy-ocr-service
    restart: always
    ports:
      - "${BOBBUY_BIND_HOST:-127.0.0.1}:${OCR_HOST_PORT:-8000}:8000"
    environment:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - bobbuy-net

