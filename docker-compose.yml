services:
  postgres:
    image: postgres:15-alpine
    container_name: bobbuy-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bobbuy}
      POSTGRES_USER: ${POSTGRES_USER:-bobbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bobbuypassword}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bobbuy} -d ${POSTGRES_DB:-bobbuy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  minio:
    image: minio/minio:latest
    container_name: bobbuy-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bobbuyadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bobbuypassword}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  redis:
    image: redis:7-alpine
    container_name: bobbuy-redis
    restart: always
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bobbuy-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bobbuy-rabbitmq
    restart: always
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp &&
      rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-bobbuy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-bobbuypassword}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  nacos:
    image: nacos/nacos-server:v2.3.2-slim
    container_name: bobbuy-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - bobbuy-net

  nacos-init:
    image: curlimages/curl:8.7.1
    container_name: bobbuy-nacos-init
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      CONFIG_DIR: /config
    command: ["sh", "/scripts/init-config.sh"]
    volumes:
      - ./infra/nacos/config:/config:ro
      - ./infra/nacos/init-config.sh:/scripts/init-config.sh:ro
    networks:
      - bobbuy-net

  core-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-core
    container_name: bobbuy-core-service
    restart: always
    environment:
      SERVER_PORT: 8081
      NACOS_SERVER_ADDR: nacos:8848
      BOBBUY_SEED_ENABLED: ${BOBBUY_SEED_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bobbuy-net

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-ai
    container_name: bobbuy-ai-service
    restart: always
    environment:
      SERVER_PORT: 8082
      NACOS_SERVER_ADDR: nacos:8848
      BOBBUY_AI_LLM_MAIN_URL: ${BOBBUY_AI_LLM_MAIN_URL}
      BOBBUY_AI_LLM_EDGE_URL: ${BOBBUY_AI_LLM_EDGE_URL}
      BOBBUY_AI_LLM_MAIN_MODEL: ${BOBBUY_AI_LLM_MAIN_MODEL}
      BOBBUY_AI_LLM_EDGE_MODEL: ${BOBBUY_AI_LLM_EDGE_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bobbuy-net

  im-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-im
    container_name: bobbuy-im-service
    restart: always
    environment:
      SERVER_PORT: 8083
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - bobbuy-net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-auth
    container_name: bobbuy-auth-service
    restart: always
    environment:
      SERVER_PORT: 8084
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8084/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bobbuy-frontend
    restart: always
    volumes:
      - ./data/logs/frontend:/var/log/nginx
    depends_on:
      gateway-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bobbuy-net

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: bobbuy-gateway
    container_name: bobbuy-gateway-service
    restart: always
    environment:
      SERVER_PORT: 8080
      NACOS_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      core-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      im-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - bobbuy-net

  gateway:
    image: nginx:alpine
    container_name: bobbuy-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/logs/gateway:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      gateway-service:
        condition: service_healthy
    networks:
      - bobbuy-net

networks:
  bobbuy-net:
    name: bobbuy-net
    driver: bridge
