      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_FLYWAY_ENABLED: "false"
      BOBBUY_FLYWAY_BASELINE_ON_MIGRATE: ${BOBBUY_FLYWAY_BASELINE_ON_MIGRATE:-false}
      BOBBUY_SEED_ENABLED: ${BOBBUY_SEED_ENABLED:-false}
      BOBBUY_SEED_PICKING_FIXTURE_ENABLED: ${BOBBUY_SEED_PICKING_FIXTURE_ENABLED:-false}
      BOBBUY_SECURITY_JWT_SECRET: ${BOBBUY_SECURITY_JWT_SECRET:-}
