      BOBBUY_SECURITY_HEADER_AUTH_ENABLED: ${BOBBUY_SECURITY_HEADER_AUTH_ENABLED:-false}
      BOBBUY_SECURITY_SERVICE_TOKEN: ${BOBBUY_SECURITY_SERVICE_TOKEN:-}
      BOBBUY_MINIO_ENDPOINT: http://minio:9000
      BOBBUY_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bobbuyadmin}
      BOBBUY_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bobbuypassword}
      BOBBUY_MINIO_BUCKET: ${BOBBUY_MINIO_BUCKET:-bobbuy-media}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-bobbuy}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-bobbuypassword}
      BOBBUY_AI_LLM_MAIN_PROVIDER: ${BOBBUY_AI_LLM_MAIN_PROVIDER:-auto}
      BOBBUY_AI_LLM_MAIN_URL: ${BOBBUY_AI_LLM_MAIN_URL:-}
      BOBBUY_AI_LLM_EDGE_URL: ${BOBBUY_AI_LLM_EDGE_URL:-}
      BOBBUY_AI_LLM_MAIN_MODEL: ${BOBBUY_AI_LLM_MAIN_MODEL:-qwen2.5:7b}
      BOBBUY_AI_LLM_EDGE_MODEL: ${BOBBUY_AI_LLM_EDGE_MODEL:-llama3.2-vision:11b}
      BOBBUY_AI_LLM_CODEX_COMMAND: ${BOBBUY_AI_LLM_CODEX_COMMAND:-}
      BOBBUY_AI_LLM_CODEX_TIMEOUT_SECONDS: ${BOBBUY_AI_LLM_CODEX_TIMEOUT_SECONDS:-120}
      BOBBUY_AI_LLM_CODEX_BRIDGE_URL: ${BOBBUY_AI_LLM_CODEX_BRIDGE_URL:-}
      BOBBUY_AI_LLM_CODEX_BRIDGE_MODEL: ${BOBBUY_AI_LLM_CODEX_BRIDGE_MODEL:-gpt-5.3-codex}
