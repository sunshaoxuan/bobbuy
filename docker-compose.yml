      BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_ITERATIONS: ${BOBBUY_AI_LLM_CODEX_BRIDGE_SECRET_ITERATIONS:-200000}
      BOBBUY_AI_SECRET_MASTER_PASSWORD: ${BOBBUY_AI_SECRET_MASTER_PASSWORD:-}
      BOBBUY_AI_LLM_OLLAMA_HEALTH_TIMEOUT_SECONDS: ${BOBBUY_AI_LLM_OLLAMA_HEALTH_TIMEOUT_SECONDS:-3}
      BOBBUY_OCR_URL: ${BOBBUY_OCR_URL:-http://ocr-service:8000}
