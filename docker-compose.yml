services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    container_name: bobbuy-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bobbuy}
      POSTGRES_USER: ${POSTGRES_USER:-bobbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bobbuypassword}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bobbuy} -d ${POSTGRES_DB:-bobbuy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  minio:
    image: minio/minio:latest
    container_name: bobbuy-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bobbuyadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bobbuypassword}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  redis:
    image: redis:7-alpine
    container_name: bobbuy-redis
    restart: always
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bobbuy-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bobbuy-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-bobbuy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-bobbuypassword}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bobbuy-net

  # Application Services
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bobbuy-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bobbuy}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-bobbuy}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-bobbuypassword}
      - BOBBUY_MINIO_ENDPOINT=${BOBBUY_MINIO_ENDPOINT:-http://minio:9000}
      - BOBBUY_MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-bobbuyadmin}
      - BOBBUY_MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-bobbuypassword}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - BOBBUY_SEED_ENABLED=${BOBBUY_SEED_ENABLED:-false}
      - BOBBUY_AI_LLM_MAIN_URL=${BOBBUY_AI_LLM_MAIN_URL}
      - BOBBUY_AI_LLM_EDGE_URL=${BOBBUY_AI_LLM_EDGE_URL}
    volumes:
      - ./data/logs/backend:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - bobbuy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bobbuy-frontend
    restart: always
    volumes:
      - ./data/logs/frontend:/var/log/nginx
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bobbuy-net

  # Global Ingress Gateway
  gateway:
    image: nginx:alpine
    container_name: bobbuy-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/logs/gateway:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - bobbuy-net

networks:
  bobbuy-net:
    name: bobbuy-net
    driver: bridge
