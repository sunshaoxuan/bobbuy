server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-BOBBUY-SERVICE-TOKEN "";
    proxy_set_header X-BOBBUY-INTERNAL-SERVICE "";

    location /ws {
        proxy_pass http://gateway-service:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api {
        proxy_pass http://gateway-service:8080;
    }

    location /health {
        proxy_pass http://gateway-service:8080/api/health;
    }

    location / {
        proxy_pass http://frontend:80;
    }

    location /media/ {
        rewrite ^/media/(.*)$ /bobbuy-media/$1 break;
        proxy_pass http://minio:9000;
    }
}
